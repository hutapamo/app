<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OverTimer — The Timer That Keeps Counting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --danger: #EF4444;
            --danger-dark: #DC2626;
            --success: #10B981;
            --bg: #0F172A;
            --surface: #1E293B;
            --surface-hover: #334155;
            --text: #F8FAFC;
            --text-dim: #94A3B8;
            --border: #334155;
            --overtime-glow: #EF4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #818CF8 0%, #C084FC 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            color: var(--text-dim);
            font-size: 1rem;
        }

        .timer-creator {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .time-input {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            color: var(--text);
            font-size: 2rem;
            font-weight: 600;
            width: 100px;
            text-align: center;
            transition: all 0.2s;
        }

        .time-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .time-label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.3);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: var(--danger-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3);
        }

        .btn-secondary {
            background: var(--surface-hover);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #475569;
            transform: translateY(-2px);
        }

        .btn-small {
            padding: 10px 20px;
            font-size: 0.9rem;
        }

        .history {
            margin-top: 24px;
        }

        .history-title {
            color: var(--text-dim);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-align: center;
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        .history-item {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item:hover {
            border-color: var(--primary);
            background: var(--surface-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        .history-item-time {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .history-item-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .timers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 32px;
        }

        .timer-card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            position: relative;
            animation: slideIn 0.4s ease;
            transition: all 0.3s;
        }

        .timer-card.overtime {
            border-color: var(--overtime-glow);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
            }
            50% {
                box-shadow: 0 0 50px rgba(239, 68, 68, 0.5);
            }
        }

        .timer-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .timer-icon {
            font-size: 1.5rem;
        }

        .timer-display {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .progress-ring {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-ring svg {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg);
            display: block;
        }

        .progress-ring-circle {
            transition: stroke-dashoffset 0.3s ease;
            transform-origin: center;
        }

        .timer-time {
            position: relative;
            z-index: 10;
            font-size: 2.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            text-align: center;
        }

        .timer-card.overtime .timer-time {
            color: var(--danger);
        }

        .timer-label {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-top: 8px;
        }

        .timer-card.overtime .timer-label {
            color: var(--danger);
            font-weight: 600;
        }

        .timer-meta {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .timer-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 1.2rem;
            font-weight: 500;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal h2 {
            margin-bottom: 24px;
            font-size: 1.8rem;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-label {
            color: var(--text-dim);
        }

        .summary-value {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .modal-actions {
            margin-top: 32px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .timer-creator {
                padding: 24px;
            }

            .time-input {
                width: 80px;
                font-size: 1.5rem;
                padding: 12px;
            }

            .btn {
                padding: 14px 24px;
                font-size: 1rem;
            }

            .timers-grid {
                grid-template-columns: 1fr;
            }

            .timer-time {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⏱️ OverTimer</h1>
            <p class="tagline">The timer that keeps counting when you go over</p>
        </header>

        <div class="timer-creator">
            <div class="input-group">
                <div>
                    <input type="number" id="hours" class="time-input" value="0" min="0" max="23">
                    <span class="time-label">Hours</span>
                </div>
                <div>
                    <input type="number" id="minutes" class="time-input" value="3" min="0" max="59">
                    <span class="time-label">Minutes</span>
                </div>
                <div>
                    <input type="number" id="seconds" class="time-input" value="0" min="0" max="59">
                    <span class="time-label">Seconds</span>
                </div>
            </div>
            <div style="text-align: center;">
                <button class="btn btn-primary" onclick="createTimer()">Start Timer</button>
            </div>
            <div class="history" id="history">
                <div class="history-title">Recent Timers</div>
                <div class="history-grid" id="historyGrid"></div>
            </div>
        </div>

        <div class="timers-grid" id="timers">
            <div class="empty-state">
                <div class="empty-state-icon">⏱️</div>
                <div class="empty-state-text">Create your first timer to get started</div>
            </div>
        </div>
    </div>

    <div class="modal" id="summaryModal">
        <div class="modal-content">
            <h2>Timer Complete</h2>
            <div id="summaryContent"></div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="closeSummary()">Got it</button>
            </div>
        </div>
    </div>

    <audio id="alarmSound" loop>
        <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <script>
        let timers = [];
        let timerHistory = [];
        let nextTimerId = 1;
        let alarmAudioContext = null;
        let oscillators = new Map();

        // Load history from localStorage
        function loadHistory() {
            const saved = localStorage.getItem('timerHistory');
            if (saved) {
                timerHistory = JSON.parse(saved);
                renderHistory();
            }
        }

        function saveHistory() {
            localStorage.setItem('timerHistory', JSON.stringify(timerHistory));
        }

        function addToHistory(hours, minutes, seconds) {
            const totalSeconds = hours * 3600 + minutes * 60 + seconds;
            const entry = { hours, minutes, seconds, totalSeconds };
            
            // Remove if already exists
            timerHistory = timerHistory.filter(h => h.totalSeconds !== totalSeconds);
            
            // Add to front
            timerHistory.unshift(entry);
            
            // Keep only last 6
            timerHistory = timerHistory.slice(0, 6);
            
            saveHistory();
            renderHistory();
        }

        function renderHistory() {
            const historyEl = document.getElementById('history');
            const historyGrid = document.getElementById('historyGrid');
            
            if (timerHistory.length === 0) {
                historyEl.style.display = 'none';
                return;
            }
            
            historyEl.style.display = 'block';
            historyGrid.innerHTML = timerHistory.map(h => {
                const timeStr = formatTime(h.hours, h.minutes, h.seconds);
                const label = formatDuration(h.hours, h.minutes, h.seconds);
                return `
                    <div class="history-item" onclick="quickStart(${h.hours}, ${h.minutes}, ${h.seconds})">
                        <div class="history-item-time">${timeStr}</div>
                        <div class="history-item-label">Quick Start</div>
                    </div>
                `;
            }).join('');
        }

        function quickStart(hours, minutes, seconds) {
            const totalSeconds = hours * 3600 + minutes * 60 + seconds;
            
            const timer = {
                id: nextTimerId++,
                originalDuration: totalSeconds,
                originalHours: hours,
                originalMinutes: minutes,
                originalSeconds: seconds,
                remainingSeconds: totalSeconds,
                startTime: new Date(),
                isOvertime: false,
                overtimeSeconds: 0,
                alarmPlaying: false,
                interval: null
            };

            timers.push(timer);
            renderTimers();
            startTimer(timer);
            
            // Move to top of history
            addToHistory(hours, minutes, seconds);
        }



        function formatDuration(h, m, s) {
            const parts = [];
            if (h > 0) parts.push(`${h}h`);
            if (m > 0) parts.push(`${m}m`);
            if (s > 0 || parts.length === 0) parts.push(`${s}s`);
            return parts.join(' ');
        }

        function createTimer() {
            const hours = parseInt(document.getElementById('hours').value) || 0;
            const minutes = parseInt(document.getElementById('minutes').value) || 0;
            const seconds = parseInt(document.getElementById('seconds').value) || 0;
            
            const totalSeconds = hours * 3600 + minutes * 60 + seconds;
            
            if (totalSeconds === 0) {
                alert('Please set a time greater than 0');
                return;
            }

            addToHistory(hours, minutes, seconds);

            const timer = {
                id: nextTimerId++,
                originalDuration: totalSeconds,
                originalHours: hours,
                originalMinutes: minutes,
                originalSeconds: seconds,
                remainingSeconds: totalSeconds,
                startTime: new Date(),
                isOvertime: false,
                overtimeSeconds: 0,
                alarmPlaying: false,
                interval: null
            };

            timers.push(timer);
            renderTimers();
            startTimer(timer);
        }

        function startTimer(timer) {
            timer.interval = setInterval(() => {
                if (!timer.isOvertime) {
                    timer.remainingSeconds--;
                    
                    if (timer.remainingSeconds <= 0) {
                        timer.isOvertime = true;
                        timer.remainingSeconds = 0;
                        timer.overtimeSeconds = 0;
                        playAlarm(timer.id);
                        renderTimers(); // Full re-render when switching to overtime
                    } else {
                        updateTimerDisplay(timer); // Just update display
                    }
                } else {
                    timer.overtimeSeconds++;
                    updateTimerDisplay(timer); // Just update display
                }
            }, 1000);
        }

        function playAlarm(timerId) {
            const timer = timers.find(t => t.id === timerId);
            if (!timer) return;
            
            timer.alarmPlaying = true;
            
            // Initialize audio context on first use
            if (!alarmAudioContext) {
                alarmAudioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            // Create oscillator for this timer
            const oscillator = alarmAudioContext.createOscillator();
            const gainNode = alarmAudioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(alarmAudioContext.destination);
            
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            
            // Beep pattern
            let isBeeping = true;
            gainNode.gain.value = 0.3;
            
            const beepInterval = setInterval(() => {
                if (!timer.alarmPlaying) {
                    clearInterval(beepInterval);
                    return;
                }
                isBeeping = !isBeeping;
                gainNode.gain.value = isBeeping ? 0.3 : 0;
            }, 400);
            
            oscillator.start();
            oscillators.set(timerId, { oscillator, gainNode, beepInterval });
        }

        function silenceAlarm(timerId) {
            const timer = timers.find(t => t.id === timerId);
            if (!timer) return;
            
            timer.alarmPlaying = false;
            
            const osc = oscillators.get(timerId);
            if (osc) {
                clearInterval(osc.beepInterval);
                try {
                    osc.oscillator.stop();
                } catch (e) {}
                oscillators.delete(timerId);
            }
            
            renderTimers();
        }

        function stopTimer(timerId) {
            const timer = timers.find(t => t.id === timerId);
            if (!timer) return;

            clearInterval(timer.interval);
            silenceAlarm(timerId);

            // Show summary
            showSummary(timer);

            // Remove timer
            timers = timers.filter(t => t.id !== timerId);
            renderTimers();
        }

        function showSummary(timer) {
            const endTime = new Date();
            const totalElapsed = Math.floor((endTime - timer.startTime) / 1000);
            
            const summaryHTML = `
                <div class="summary-item">
                    <span class="summary-label">Original Timer</span>
                    <span class="summary-value">${formatTime(timer.originalHours, timer.originalMinutes, timer.originalSeconds)}</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">Started At</span>
                    <span class="summary-value">${formatTimeOfDay(timer.startTime)}</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">Ended At</span>
                    <span class="summary-value">${formatTimeOfDay(endTime)}</span>
                </div>
                ${timer.isOvertime ? `
                <div class="summary-item">
                    <span class="summary-label">Overtime</span>
                    <span class="summary-value" style="color: var(--danger)">+${formatTimeFromSeconds(timer.overtimeSeconds)}</span>
                </div>` : ''}
                <div class="summary-item">
                    <span class="summary-label">Total Time</span>
                    <span class="summary-value">${formatTimeFromSeconds(totalElapsed)}</span>
                </div>
            `;
            
            document.getElementById('summaryContent').innerHTML = summaryHTML;
            document.getElementById('summaryModal').classList.add('active');
        }

        function closeSummary() {
            document.getElementById('summaryModal').classList.remove('active');
        }

        function formatTime(h, m, s) {
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function formatTimeFromSeconds(totalSec) {
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            return formatTime(h, m, s);
        }

        function formatTimeOfDay(date) {
            return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }

        function drawProgressRing(percentage, isOvertime, timerId) {
            const radius = 85;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (percentage / 100) * circumference;
            
            const strokeColor = isOvertime ? '#EF4444' : '#818CF8';
            const bgColor = '#334155';
            
            return `
                <svg width="200" height="200" viewBox="0 0 200 200">
                    <circle
                        cx="100"
                        cy="100"
                        r="${radius}"
                        stroke="${bgColor}"
                        stroke-width="12"
                        fill="none"
                    />
                    <circle
                        id="progress-circle-${timerId}"
                        class="progress-ring-circle"
                        cx="100"
                        cy="100"
                        r="${radius}"
                        stroke="${strokeColor}"
                        stroke-width="12"
                        fill="none"
                        stroke-dasharray="${circumference}"
                        stroke-dashoffset="${offset}"
                        stroke-linecap="round"
                    />
                </svg>
            `;
        }

        function updateTimerDisplay(timer) {
            const timeEl = document.getElementById(`timer-time-${timer.id}`);
            const progressCircle = document.getElementById(`progress-circle-${timer.id}`);
            
            if (!timeEl || !progressCircle) {
                console.log('Elements not found, doing full render');
                renderTimers();
                return;
            }
            
            let displayTime, progressPercentage;
            if (timer.isOvertime) {
                displayTime = '+' + formatTimeFromSeconds(timer.overtimeSeconds);
                progressPercentage = 100;
            } else {
                displayTime = formatTimeFromSeconds(timer.remainingSeconds);
                progressPercentage = (timer.remainingSeconds / timer.originalDuration) * 100;
            }
            
            // Update time text
            timeEl.textContent = displayTime;
            
            // Update progress ring
            const radius = 85;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (progressPercentage / 100) * circumference;
            progressCircle.setAttribute('stroke-dashoffset', offset);
        }

        function restartTimer(timerId) {
            const timer = timers.find(t => t.id === timerId);
            if (!timer) return;
            
            quickStart(timer.originalHours, timer.originalMinutes, timer.originalSeconds);
        }

        function renderTimers() {
            const container = document.getElementById('timers');
            
            if (timers.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⏱️</div>
                        <div class="empty-state-text">Create your first timer to get started</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = timers.map(timer => {
                const icon = timer.isOvertime ? '🔴' : '⏱';
                const originalLabel = formatDuration(timer.originalHours, timer.originalMinutes, timer.originalSeconds);
                
                let displayTime, label, progressPercentage;
                if (timer.isOvertime) {
                    displayTime = '+' + formatTimeFromSeconds(timer.overtimeSeconds);
                    label = 'overtime';
                    progressPercentage = 100; // Full circle in overtime
                } else {
                    displayTime = formatTimeFromSeconds(timer.remainingSeconds);
                    label = '';
                    progressPercentage = (timer.remainingSeconds / timer.originalDuration) * 100;
                }

                const overtimeClass = timer.isOvertime ? 'overtime' : '';
                const progressRing = drawProgressRing(progressPercentage, timer.isOvertime, timer.id);
                
                const controls = timer.isOvertime
                    ? `
                        ${timer.alarmPlaying 
                            ? `<button class="btn btn-secondary btn-small" onclick="silenceAlarm(${timer.id})">🔇 Silence</button>`
                            : ''}
                        <button class="btn btn-danger btn-small" onclick="stopTimer(${timer.id})">Stop</button>
                    `
                    : `
                        <button class="btn btn-secondary btn-small" onclick="restartTimer(${timer.id})">↻ Restart</button>
                        <button class="btn btn-danger btn-small" onclick="stopTimer(${timer.id})">Stop</button>
                    `;

                return `
                    <div class="timer-card ${overtimeClass}" id="timer-card-${timer.id}">
                        <div class="timer-header">
                            <span class="timer-icon">${icon}</span>
                            <span>${originalLabel} timer</span>
                        </div>
                        <div class="timer-display">
                            <div class="progress-ring">
                                ${progressRing}
                                <div class="timer-time" id="timer-time-${timer.id}">${displayTime}</div>
                            </div>
                            ${label ? `<div class="timer-label">${label}</div>` : ''}
                        </div>
                        <div class="timer-meta">Started at ${formatTimeOfDay(timer.startTime)}</div>
                        <div class="timer-controls">
                            ${controls}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Initialize
        loadHistory();
        renderTimers();

        // Close modal on background click
        document.getElementById('summaryModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeSummary();
            }
        });

        // Allow Enter key to create timer
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !document.getElementById('summaryModal').classList.contains('active')) {
                createTimer();
            }
        });
    </script>
</body>
</html>
